# Render Blueprint — one public URL (UI + API on the same service)
# https://render.com/docs/infrastructure-as-code
#
# New → Blueprint → connect repo. App: https://<service-name>.onrender.com
#
# Login: AUTO_SEED_ADMIN creates admin@acme.com / Admin@123 on first boot if DB is empty.
# After login, unset AUTO_SEED_ADMIN in the dashboard, change password, and optionally run: python seed.py
#
# Free Postgres expires after ~30 days unless upgraded — see Render pricing.

databases:
  - name: hyglow-db
    plan: free
    databaseName: hyglow

services:
  - type: web
    name: hyglow
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    buildFilter:
      paths:
        - Dockerfile
        - .dockerignore
        - backend/**
        - frontend/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hyglow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: AUTO_SEED_ADMIN
        value: "1"
