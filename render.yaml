# Render Blueprint — one public URL (UI + API on the same service)
# https://render.com/docs/infrastructure-as-code
#
# New → Blueprint → connect repo. App: https://<service-name>.onrender.com
#
# Login: empty DB auto-creates admin@acme.com / Admin@123 on startup (no env vars required).
# Set DISABLE_AUTO_ADMIN=1 to turn that off. Run python seed.py in Shell for full demo data.
#
# Free Postgres expires after ~30 days unless upgraded — see Render pricing.

databases:
  - name: hyglow-db
    plan: free
    databaseName: hyglow

services:
  - type: web
    name: hyglow
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    buildFilter:
      paths:
        - Dockerfile
        - .dockerignore
        - backend/**
        - frontend/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hyglow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
