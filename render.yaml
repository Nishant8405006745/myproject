# Render Blueprint — one Docker service + external Postgres (Supabase recommended)
# https://render.com/docs/infrastructure-as-code
#
# 1) Create a project at https://supabase.com → Settings → Database
# 2) Copy the URI (use "Session mode" or Direct "URI" for SQLAlchemy; see env.example)
# 3) New → Blueprint → connect repo. When prompted, paste DATABASE_URL (keep ?sslmode=require if present)
#
# Login: empty DB auto-creates admin@acme.com / Admin@123. Shell → python seed.py for demo data.

services:
  - type: web
    name: hyglow
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    buildFilter:
      paths:
        - Dockerfile
        - .dockerignore
        - backend/**
        - frontend/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
